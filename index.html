<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Master – Order via WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yolk: #F5A623; --yolk-dark: #D4821A; --brown: #3B2009; --shell: #FFF8ED;
      --white: #ffffff; --radius: 16px; --shadow: 0 8px 30px rgba(59,32,9,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--shell); color: var(--brown); padding-top: 78px; }

    /* NAV */
    nav {
      position: fixed; top: 0; width: 100%; height: 70px; background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; box-shadow: 0 2px 14px rgba(59,32,9,0.09); z-index: 1000;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.55rem; font-weight: 900; color: var(--brown); text-decoration: none; }
    .logo span { color: var(--yolk-dark); }
    .cart-btn {
      background: var(--yolk); border: none; width: 50px; height: 50px; border-radius: 50%;
      cursor: pointer; position: relative; font-size: 1.3rem; box-shadow: 0 4px 14px rgba(245,166,35,0.45);
    }
    .cart-count { position: absolute; top: -5px; right: -5px; background: #e53935; color: white; font-size: 0.75rem; padding: 2px 7px; border-radius: 20px; }

    /* HERO */
    .hero { background: #3B2009; color: white; text-align: center; padding: 40px 20px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; }
    .hero h1 em { color: var(--yolk); font-style: italic; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 25px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 190px; object-fit: cover; }
    .card-info { padding: 15px; flex: 1; }
    .price { font-weight: 800; color: var(--yolk-dark); font-size: 1.2rem; display: block; margin: 10px 0; }
    
    .add-btn {
      background: var(--yolk); border: none; width: 100%; padding: 12px; border-radius: 30px;
      font-weight: 700; cursor: pointer; color: var(--brown); transition: 0.2s;
    }
    .add-btn:hover { background: var(--yolk-dark); color: white; }

    /* CART DRAWER */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; display: none; }
    .drawer {
      position: fixed; top: 0; right: 0; width: 100%; max-width: 360px; height: 100%;
      background: white; z-index: 2000; transform: translateX(100%); transition: 0.3s;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    #cart-list { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .cart-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    .drawer-foot { padding: 20px; border-top: 2px solid var(--yolk); }
    
    .whatsapp-btn {
      background: #25D366; color: white; border: none; width: 100%; padding: 15px;
      border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
    }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    .modal input, .modal textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    
    @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo">🍳 Egg <span>Master</span></a>
  <button class="cart-btn" onclick="toggleCart(true)">🛒 <span class="cart-count" id="count">0</span></button>
</nav>

<div class="hero">
  <h1>Gujarat's Best <em>Egg Dishes</em></h1>
</div>

<div class="grid" id="menu-grid"></div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>
<div class="drawer" id="drawer">
  <div style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
    <h2>🛒 Your Cart</h2>
    <button onclick="toggleCart(false)" style="border:none; background:none; font-size:1.5rem;">✕</button>
  </div>
  <div id="cart-list"></div>
  <div class="drawer-foot">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:700;">
      <span>Total</span> <span id="total-price">₹0</span>
    </div>
    <button class="whatsapp-btn" onclick="openOrderModal()">WhatsApp pe Order Karo</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>📋 Order Details</h3>
    <input type="text" id="cust-name" placeholder="Aapka Naam" />
    <input type="tel" id="cust-phone" placeholder="Mobile Number" />
    <textarea id="cust-address" placeholder="Delivery Address"></textarea>
    <button class="whatsapp-btn" onclick="sendWhatsApp()">Confirm & Send WhatsApp</button>
    <button onclick="closeOrderModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#666;">Cancel</button>
  </div>
</div>

<script>
  const PHONE_NUMBER = "919586096174"; 

  const menu = [
    { name: "Surti Egg Gotalo", price: 60, img: "https://images.unsplash.com/photo-1632778149955-e80f8ceca2e8?w=600", desc: "Classic Surti style scrambled egg bhurji" },
    { name: "Egg Tikka Masala", price: 60, img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=600", desc: "Rich creamy tikka masala gravy" },
    { name: "Egg Bhurji", price: 50, img: "https://images.unsplash.com/photo-1510693206972-df098062cb71?w=600", desc: "Spiced eggs with melted cheese" },
    { name: "Egg Kheema", price: 60, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=600", desc: "Minced egg dry masala" },
    { name: "Gujarati Egg Curry", price: 60, img: "https://images.unsplash.com/photo-1548943487-a2e4e43b4853?w=600", desc: "Homestyle Gujarati gravy" },
    { name: "Boiled Egg Fry", price: 40, img: "https://images.unsplash.com/photo-1506084868230-bb9d95c24759?w=600", desc: "Pan fried eggs with masala" },
    { name: "Lasan Kachu", price: 60, img: "https://images.unsplash.com/photo-1485963631004-f2f00b1d6606?w=600", desc: "Garlic-forward egg special" },
    { name: "Egg Paplet", price: 70, img: "https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=600", desc: "Crispy spiced egg crepe" },
    { name: "Boiled Masala Egg", price: 40, img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=600", desc: "Tangy masala boiled eggs" },
    { name: "Egg Pulav Rice", price: 80, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=600", desc: "Fragrant rice with fried eggs" }
  ];

  let cart = [];

  function buildMenu() {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = menu.map((item, i) => `
      <div class="card">
        <img src="${item.img}" alt="${item.name}" />
        <div class="card-info">
          <h3>${item.name}</h3>
          <p style="font-size:0.8rem; color:#666; margin-top:5px;">${item.desc}</p>
          <span class="price">₹${item.price}</span>
          <button class="add-btn" onclick="addToCart(${i})">+ Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(i) {
    const found = cart.find(c => c.idx === i);
    if (found) found.qty++;
    else cart.push({ idx: i, qty: 1 });
    renderCart();
    toggleCart(true);
  }

  function renderCart() {
    const list = document.getElementById('cart-list');
    let total = 0, count = 0;
    if (cart.length === 0) {
      list.innerHTML = "Cart khali hai! 🍳";
      document.getElementById('total-price').textContent = "₹0";
      document.getElementById('count').textContent = "0";
      return;
    }
    list.innerHTML = cart.map(c => {
      const m = menu[c.idx];
      total += (m.price * c.qty); count += c.qty;
      return `
        <div class="cart-item">
          <img src="${m.img}" />
          <div style="flex:1"><b>${m.name}</b><br>₹${m.price} × ${c.qty}</div>
          <button onclick="removeOne(${c.idx})" style="padding:5px; border:none; cursor:pointer;">➖</button>
        </div>`;
    }).join('');
    document.getElementById('total-price').textContent = "₹" + total;
    document.getElementById('count').textContent = count;
  }

  function removeOne(idx) {
    const item = cart.find(c => c.idx === idx);
    if (item.qty > 1) item.qty--;
    else cart = cart.filter(c => c.idx !== idx);
    renderCart();
  }

  function toggleCart(s) {
    document.getElementById('drawer').classList.toggle('open', s);
    document.getElementById('overlay').style.display = s ? 'block' : 'none';
  }

  function openOrderModal() {
    if (cart.length === 0) return alert("Pehle items add karein!");
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeOrderModal() { document.getElementById('modal-overlay').style.display = 'none'; }

  function sendWhatsApp() {
    const name = document.getElementById('cust-name').value;
    const address = document.getElementById('cust-address').value;
    if (!name || !address) return alert("Please details bhariye!");

    let itemsText = cart.map(c => `• ${menu[c.idx].name} (x${c.qty})`).join("%0A");
    let total = document.getElementById('total-price').textContent;
    
    const msg = `🍳 *NEW ORDER - EGG MASTER*%0A%0A*Name:* ${name}%0A*Address:* ${address}%0A%0A*Items:*%0A${itemsText}%0A%0A*Total:* ${total}`;
    window.open(`https://wa.me/${PHONE_NUMBER}?text=${msg}`, '_blank');
  }

  buildMenu();
</script>
</body>
</html>
