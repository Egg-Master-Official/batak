    :root { 
      --gold: #D4AF37; 
      --gold-light: #F5D77A;
      --black: #080808; 
      --gold-gradient: linear-gradient(135deg, #B8860B 0%, #D4AF37 25%, #F1D37E 50%, #D4AF37 75%, #8B6914 100%);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    /* GLOBAL FONT CHANGE */
    body { font-family: 'Playfair Display', serif; background: var(--black); color: white; overflow-x: hidden; }

    .lang-btn:hover { background: rgba(212,175,55,0.3); }
    .lang-dropdown { display: none; position: absolute; top: 45px; left: 0; background: #000; border: 1px solid var(--gold); border-radius: 10px; overflow: hidden; min-width: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

    .lang-option { padding: 10px 15px; color: #fff; cursor: pointer; transition: 0.2s; font-family: 'Playfair Display', serif; font-size: 0.85rem; border-bottom: 1px solid #222; }
    .lang-option:last-child { border-bottom: none; }
    .lang-option:hover { background: var(--gold); color: #000; }
    .lang-option.selected { background: rgba(212,175,55,0.2); color: var(--gold); }

    /* ========== DESIGNED LOGO ========== */
    .logo-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      user-select: none;
      text-decoration: none;
    }
    
    .logo-design {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5px 15px;
      border: 2px solid var(--gold);
      border-radius: 50px; /* Pill shape */
      position: relative;
      background: rgba(0,0,0,0.5);
      animation: logoFloat 4s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    
    .logo-design:hover {
      background: rgba(212,175,55,0.1);
      box-shadow: 0 0 20px rgba(212,175,55,0.4);
    }
    
    /* Decorative line inside logo */
    .logo-line {
      width: 60%;
      height: 1px;
      background: var(--gold);
      margin: 2px 0;
    }

    .logo-main-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 3px;
      line-height: 1;
    }
    
    .logo-sub-text {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes logoFloat {

      50% { transform: translateY(-5px) rotate(0.5deg) scale(1.02); filter: drop-shadow(0 10px 20px rgba(212,175,55,0.6)); }
    }
    
    .cart-btn {
      position: absolute; right: 15px; color: var(--gold); font-size: 1.6rem; cursor: pointer; padding: 10px; transition: all 0.3s; background: rgba(212,175,55,0.1); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;

    .cart-btn:hover { transform: scale(1.1); background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.3); }

    /* ========== HERO BANNER ========== */
    .hero-banner { margin-top: 90px; padding: 30px 15px; text-align: center; background: linear-gradient(135deg, rgba(15,15,15,0.95) 0%, rgba(30,25,15,0.95) 100%); border: 2px solid var(--gold); margin-left: auto; margin-right: auto; max-width: 95%; border-radius: 20px; position: relative; z-index: 5000; box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.3); overflow: hidden; }
    .hero-banner h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; letter-spacing: 3px; position: relative; z-index: 2; font-style: italic; }
    .timing-box { font-size: 0.9rem; color: #ddd; border-top: 1px solid rgba(212,175,55,0.3); padding-top: 12px; position: relative; z-index: 2; }
    .neon-dot { height: 10px; width: 10px; background: #00ff88; display: inline-block; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88; animation: neonPulse 1.5s infinite; }
    @keyframes neonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ========== MENU GRID ========== */
    .main-content { position: relative; z-index: 5000; padding: 20px 10px; max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

    @media (max-width: 600px) {

    #cart-slide.active { right: 0; }
    
    /* ========== MAHARAJA STYLE ORDER FORM ========== */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 15000; display: none; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px); perspective: 1000px; }
    
    .modal-content {

    .modal-content::after { bottom: -8px; border-top: 2px solid #5D4037; }

    .ornament { text-align: center; font-size: 1.2rem; color: #8B5A2B; margin: 10px 0; letter-spacing: 5px; }
    
    .form-group { position: relative; margin-bottom: 20px; }
    
    .modal-content input, .modal-content textarea { width: 100%; background: transparent; border: none; border-bottom: 2px solid #8D6E63; color: #3E2723; padding: 12px 5px; margin-top: 5px; font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: all 0.3s; outline: none; }

      close: "✕ બંધ કરો",
      add_to_cart: "કાર્ટમાં ઉમેરો",
      added: "ઉમેર્યું!",
      rupee: "₹"
    }
  };

  const menu = [
    { id: 1, name: "Boiled Egg Fry", price: 50, img: "https://i.ibb.co/xSdzbzzf/boild-egg-fry.jpg", quote: "The golden crisp you deserve." },
    { id: 2, name: "Bombay Omlet", price: 50, img: "https://i.ibb.co/vv1xsk7G/bombe-omlet.jpg", quote: "Classic street style comfort." },
    { id: 3, name: "Bread Omlet", price: 60, img: "https://i.ibb.co/JRS6Lcyc/bread-omlet.jpg", quote: "A bite of morning sunshine." },
    { id: 4, name: "Egg Bhurji", price: 60, img: "https://i.ibb.co/4Rh3gjss/egg-bhurji.jpg", quote: "Scrambled spice perfection." },
    { id: 5, name: "Egg Kheema", price: 60, img: "https://i.ibb.co/7NJbpHnw/egg-khima.jpg", quote: "Rich, hearty, and royal." },
    { id: 6, name: "Egg Lachko", price: 80, img: "https://i.ibb.co/LDhLfpZy/egg-Lachko.jpg", quote: "Surti soul on a plate." },
    { id: 7, name: "Egg Tikka", price: 60, img: "https://i.ibb.co/8DgfRBnK/egg-mashala-tikka.jpg", quote: "Aromatic masala embrace." },
    { id: 10, name: "Surti Gotalo", price: 80, img: "https://i.ibb.co/pv1FGXCr/surti-gotalo.jpg", quote: "The ultimate egg masterpiece." }
  ];

  // ========== LANGUAGE FUNCTIONS ==========
  function toggleLangDropdown() { document.getElementById('lang-dropdown').classList.toggle('active'); }
  function setLanguage(lang) {
    currentLang = lang;
    const dict = translations[lang];
    document.querySelectorAll('[data-translate]').forEach(el => { const key = el.getAttribute('data-translate'); if (dict[key]) el.textContent = dict[key]; });
    document.querySelectorAll('[data-translate-placeholder]').forEach(el => { const key = el.getAttribute('data-translate-placeholder'); if (dict[key]) el.placeholder = dict[key]; });
    const langNames = { en: 'ENG', hi: 'HIN', gu: 'GUJ' };
    document.getElementById('current-lang').innerText = langNames[lang];
    document.querySelectorAll('.lang-option').forEach(opt => { opt.classList.remove('selected'); if (opt.getAttribute('onclick').includes(lang)) opt.classList.add('selected'); });
    document.getElementById('lang-dropdown').classList.remove('active');
    renderMenu();
  }
  document.addEventListener('click', (e) => { if (!e.target.closest('.lang-switcher')) { document.getElementById('lang-dropdown').classList.remove('active'); } });

  // ========== PARTICLE EFFECTS ==========
  const heroBanner = document.getElementById('hero-banner');
  const particleContainer = document.getElementById('particle-container');
  let lastMoveTime = 0;

  function createFloatingGrain(x, y) {
    const particle = document.createElement('div');
    particle.className = 'grain-particle';
    const size = 2 + Math.random() * 3;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.background = `radial-gradient(circle at 30% 30%, #fff, #D4AF37)`;
    particle.style.boxShadow = `0 0 ${size}px rgba(212,175,55,0.8)`;
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    particle.style.opacity = '1';
    particleContainer.appendChild(particle);
    const angle = Math.random() * Math.PI * 2;
    const distance = 20 + Math.random() * 40;
    const endX = Math.cos(angle) * distance;
    const endY = Math.sin(angle) * distance - 30;
    particle.animate([ { transform: 'translate(0, 0) scale(1)', opacity: 1 }, { transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 } ], { duration: 600 + Math.random() * 400, easing: 'ease-out', fill: 'forwards' });
    setTimeout(() => particle.remove(), 1000);
  }
  heroBanner.addEventListener('touchmove', (e) => { const now = Date.now(); if (now - lastMoveTime > 30) { const touch = e.touches[0]; createFloatingGrain(touch.clientX, touch.clientY); lastMoveTime = now; } });
  heroBanner.addEventListener('mousemove', (e) => { const now = Date.now(); if (now - lastMoveTime > 50) { createFloatingGrain(e.clientX, e.clientY); lastMoveTime = now; } });

  function burstParticles(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'grain-particle';
      const size = 4 + Math.random() * 6;
      particle.style.width = size + 'px'; particle.style.height = size + 'px';
      particle.style.background = `radial-gradient(circle at 30% 30%, #fff, #D4AF37)`;
      particle.style.boxShadow = `0 0 ${size}px #D4AF37`;
      particle.style.left = centerX + 'px'; particle.style.top = centerY + 'px';
      particleContainer.appendChild(particle);
      const angle = (Math.PI * 2 * Math.random());
      const velocity = 100 + Math.random() * 150;
      const endX = Math.cos(angle) * velocity;
      const endY = Math.sin(angle) * velocity - 80;
      particle.animate([ { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 }, { transform: `translate(calc(-50% + ${endX}px), calc(-50% + ${endY}px)) scale(0)`, opacity: 0 } ], { duration: 800 + Math.random() * 600, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)', fill: 'forwards' });
      setTimeout(() => particle.remove(), 1500);
    }
  }

  function toggleCart(s) { document.getElementById('cart-slide').classList.toggle('active', s); }
  function openOrderForm() { if(cart.length > 0) document.getElementById('order-modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

  function renderMenu() {
    const t = translations[currentLang];
    document.getElementById('menu-grid').innerHTML = menu.map((item, index) => `
      <div class="card-wrapper" style="animation: fadeInUp 0.6s ease ${index * 0.1}s both;">
        <div class="frame-box">
            <img class="dish-img" src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200/1a1a1a/D4AF37?text=EGG+DISH'">
        </div>
        <div class="dish-info">
            <div class="dish-name">${item.name}</div>
            <div class="dish-quote">"${item.quote}"</div>
            <div class="price">${t.rupee}${item.price}</div>
            <button class="btn-gold" onclick="addToCart(${item.id}, this)">${t.add_to_cart}</button>
        </div>
      </div>`).join('');
  }

  function addToCart(id, btn) {
    const item = menu.find(m => m.id === id);
    const existing = cart.find(c => c.id === id);
    if(existing) existing.qty++; else cart.push({...item, qty:1});
    updateUI();
    const t = translations[currentLang];
    btn.textContent = t.added;
    btn.style.background = '#00ff88';
    setTimeout(() => { btn.textContent = t.add_to_cart; btn.style.background = ''; }, 800);
  }

  function updateUI() {
    let total = 0, count = 0;
    const t = translations[currentLang];
    document.getElementById('cart-items').innerHTML = cart.map(item => {
      total += (item.price * item.qty); count += item.qty;
      return `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid #222;">
        <div><div style="font-weight:700; color:#fff;">${item.name}</div><div style="color:#888; font-size:0.85rem;">Qty: ${item.qty} × ${t.rupee}${item.price}</div></div>
        <b style="color:var(--gold);">${t.rupee}${item.price * item.qty}</b></div>`;
    }).join('');
    document.getElementById('total-price').innerText = t.rupee + total;
    document.getElementById('cart-count').innerText = count;
  }

  function showUPIDetails() {
    const amt = document.getElementById('total-price').innerText.replace('₹','');
    document.getElementById('upi-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=upi://pay?pa=${UPI_ID}&pn=EggMaster&am=${amt}&cu=INR`;
    document.getElementById('qr-area').style.display = 'block';
  }

  // ========== SUBMIT ORDER FIX ==========
  async function submitOrder(method) {
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    const addr = document.getElementById('c-addr').value;
    if(!name || !phone || !addr) {
      alert(currentLang === 'hi' ? "कृपया सभी विवरण भरें!" : currentLang === 'gu' ? "કૃપા કરીને બધી વિગતો ભરો!" : "Please fill all details!");
      return;
    }
    const t = translations[currentLang];
    const orderText = cart.map(i => `${i.name} x${i.qty}`).join('\n');
    const totalPrice = document.getElementById('total-price').innerText;
    const msg = `*NEW ORDER*\nName: ${name}\nPhone: ${phone}\nAddress: ${addr}\nItems:\n${orderText}\nTotal: ${totalPrice}\nPayment: ${method}`;

    const now = new Date();
    document.getElementById('bill-date').innerText = `Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;
    document.getElementById('bill-items-list').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin:5px 0;"><span>${i.name} x${i.qty}</span><span>${t.rupee}${i.price*i.qty}</span></div>`).join('');
    document.getElementById('bill-grand-total').innerText = "TOTAL: " + totalPrice;

    const billArea = document.getElementById('bill-area');
    billArea.style.position = 'fixed'; billArea.style.left = '0'; billArea.style.top = '0'; billArea.style.zIndex = '99999';
    await new Promise(r => setTimeout(r, 100));

    try {
      const canvas = await html2canvas(billArea, { scale: 2, useCORS: true, allowTaint: true });
      canvas.toBlob(async (blob) => {
        if (!blob) { fallbackWhatsApp(msg, name); return; }
        const file = new File([blob], `Bill_${name}.jpg`, { type: 'image/jpeg' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try { await navigator.share({ files: [file], title: 'Egg Master Order', text: msg }); } catch (err) { console.log("Share cancelled", err); fallbackWhatsApp(msg, name); }
        } else { fallbackWhatsApp(msg, name, canvas.toDataURL('image/jpeg')); }
        billArea.style.position = 'fixed'; billArea.style.left = '-9999px'; billArea.style.zIndex = '-1';
      }, 'image/jpeg', 0.9);
    } catch (err) { console.error("Canvas error:", err); fallbackWhatsApp(msg, name); billArea.style.left = '-9999px'; }
  }

  function fallbackWhatsApp(msg, name, dataUrl) {
    if (dataUrl) { const link = document.createElement('a'); link.download = `Bill_${name}.jpg`; link.href = dataUrl; link.click(); }
    setTimeout(() => { window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`, '_blank'); }, dataUrl ? 500 : 0);
  }

  // ========== BACKGROUND ANIMATION ==========
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('bg-canvas').appendChild(renderer.domElement);
  const torusKnot = new THREE.Mesh(new THREE.TorusKnotGeometry(8, 2, 100, 16), new THREE.MeshPhongMaterial({ color: 0xD4AF37, wireframe: true, transparent: true, opacity: 0.8 }));
  scene.add(torusKnot);
  const dodecahedron = new THREE.Mesh(new THREE.DodecahedronGeometry(15, 0), new THREE.MeshPhongMaterial({ color: 0xB8860B, wireframe: true, transparent: true, opacity: 0.3 }));
  scene.add(dodecahedron);
  scene.add(new THREE.AmbientLight(0xffffff, 1)); camera.position.z = 30;
  function animate() { requestAnimationFrame(animate); torusKnot.rotation.x += 0.003; torusKnot.rotation.y += 0.005; dodecahedron.rotation.x -= 0.002; dodecahedron.rotation.y -= 0.003; renderer.render(scene, camera); }
  animate();

  // ========== INIT ==========
  renderMenu();
</script>
</body>
</html>
