<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Master – Fresh Finds, Best Price</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <style>
    :root {
      --yolk: #F5A623;
      --yolk-dark: #D4821A;
      --shell: #FFF8ED;
      --cream: #FEF3DC;
      --brown: #3B2009;
      --mid: #7A4B1E;
      --white: #FFFFFF;
      --shadow: 0 8px 40px rgba(59,32,9,0.13);
      --radius: 18px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--shell); color: var(--brown); overflow-x: hidden; }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      background: rgba(255,248,237,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid rgba(245,166,35,0.18);
      box-shadow: 0 2px 18px rgba(59,32,9,0.08);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo .egg-icon {
      width: 38px; height: 38px; background: var(--yolk);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(245,166,35,0.35);
    }
    .nav-logo span { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 900; color: var(--brown); }
    .nav-logo span em { color: var(--yolk); font-style: normal; }

    .cart-btn {
      position: relative; background: var(--yolk); border: none; cursor: pointer;
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(245,166,35,0.4);
      transition: var(--transition);
    }
    .cart-count {
      position: absolute; top: -4px; right: -4px; background: var(--brown); color: white;
      font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; border: 2px solid var(--shell);
    }
    .hidden { display: none; }

    /* HERO */
    .hero { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-img {
      position: absolute; inset: 0;
      background: url('https://i.ibb.co/zHGRTMNj/download-1.jpg') center/cover no-repeat;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }
    @keyframes heroZoom { from { transform: scale(1.06); } to { transform: scale(1.14); } }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(59,32,9,0.6) 0%, rgba(59,32,9,0.3) 100%); }
    .hero-content { position: relative; z-index: 2; text-align: center; color: white; padding: 20px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 10px; }
    .hero h1 span { color: var(--yolk); }

    /* PRODUCTS */
    #products { padding: 80px 20px; }
    .carousel-track { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; cursor: grab; }
    .product-card { flex: 0 0 280px; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: var(--transition); }
    .product-img-wrap img { width: 100%; height: 200px; object-fit: cover; }
    .product-body { padding: 20px; }
    .product-price { font-size: 1.4rem; font-weight: 900; color: var(--yolk-dark); font-family: 'Playfair Display', serif; }

    /* UTILS */
    .btn-primary, .add-cart-btn, .send-btn { cursor: pointer; border: none; transition: var(--transition); }
    .btn-primary { background: var(--yolk); padding: 15px 35px; border-radius: 50px; font-weight: bold; text-decoration: none; color: var(--brown); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 50px; color: white; opacity: 0; transition: 0.3s; z-index: 2000; }
    .toast.show { opacity: 1; bottom: 50px; }
    
    /* CART DRAWER */
    .cart-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 350px; background: white; transform: translateX(100%); transition: 0.4s; z-index: 1001; padding: 20px; display: flex; flex-direction: column; }
    .cart-drawer.open { transform: translateX(0); }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <div class="egg-icon">
      <svg viewBox="0 0 24 24" width="20"><ellipse cx="12" cy="13" rx="8" ry="10" fill="white"/><circle cx="12" cy="13" r="4" fill="#F5A623"/></svg>
    </div>
    <span>Egg <em>Master</em></span>
  </a>
  <button class="cart-btn" onclick="openCart()">
    <svg viewBox="0 0 24 24" width="20" stroke="white" fill="none" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span class="cart-count hidden" id="cart-count">0</span>
  </button>
</nav>

<section class="hero">
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Welcome to<br><span>Egg Master</span></h1>
    <p>Farm-fresh eggs delivered to your doorstep.</p><br>
    <a href="#products" class="btn-primary">Shop Now</a>
  </div>
</section>

<section id="products">
  <div class="carousel-track" id="carousel">
    <div class="product-card">
      <div class="product-img-wrap"><img src="https://i.ibb.co/rfRQLh6G/download-2.jpg" alt="Eggs"></div>
      <div class="product-body">
        <h3>Farm Fresh Eggs</h3>
        <p>Pack of 12 — Golden yolk.</p>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
          <span class="product-price">₹60</span>
          <button class="btn-primary" onclick="addToCart(this, 'Farm Fresh Eggs', 60, 'https://i.ibb.co/rfRQLh6G/download-2.jpg')" style="padding:8px 15px; font-size:0.8rem;">Add</button>
        </div>
      </div>
    </div>
    </div>
</section>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <h2>Your Cart</h2>
  <div id="cart-items" style="flex:1; overflow-y:auto; margin-top:20px;"></div>
  <div id="cart-footer" style="border-top:1px solid #eee; padding-top:15px;">
    <p>Total: <strong id="cart-total-val">₹0</strong></p>
    <button class="btn-primary" onclick="sendOrder()" style="width:100%; margin-top:10px;">Place Order</button>
  </div>
</div>

<div class="toast" id="toast" style="background: #333;"></div>

<script>
  let cart = [];
  const OWNER_EMAIL = "Ashishchavda95860@gmail.com";

  function addToCart(btn, name, price, img) {
    const existing = cart.find(i => i.name === name);
    if (existing) { existing.qty++; } 
    else { cart.push({ name, price, img, qty: 1 }); }
    updateUI();
    showToast(`Added ${name}`);
  }

  function updateUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-count').classList.toggle('hidden', count === 0);
    document.getElementById('cart-total-val').textContent = `₹${total}`;
    
    document.getElementById('cart-items').innerHTML = cart.map((item, idx) => `
      <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
        <img src="${item.img}" width="50" height="50" style="border-radius:8px;">
        <div style="flex:1;">
          <div style="font-weight:bold; font-size:0.9rem;">${item.name}</div>
          <div style="font-size:0.8rem;">₹${item.price} x ${item.qty}</div>
        </div>
        <button onclick="changeQty(${idx}, -1)" style="padding:2px 8px;">-</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${idx}, 1)" style="padding:2px 8px;">+</button>
      </div>
    `).join('');
  }

  function changeQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateUI();
  }

  function openCart() { 
    document.getElementById('cart-drawer').classList.add('open'); 
    document.getElementById('cart-overlay').classList.add('open'); 
  }
  
  function closeCart() { 
    document.getElementById('cart-drawer').classList.remove('open'); 
    document.getElementById('cart-overlay').classList.remove('open'); 
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function sendOrder() {
    if(cart.length === 0) return alert("Cart is empty");
    const summary = cart.map(i => `${i.name} (x${i.qty})`).join(", ");
    const total = document.getElementById('cart-total-val').textContent;
    const body = encodeURIComponent(`New Order:\n${summary}\nTotal: ${total}`);
    window.location.href = `mailto:${OWNER_EMAIL}?subject=New Egg Order&body=${body}`;
  }
</script>

</body>
</html>
