<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Master | Luxury Elite Edition</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #D4AF37; --black: #0A0A0A; --dark-grey: #121212; --white: #FFFFFF;
      --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #B8860B 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

    /* Background */
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

    /* Nav */
    nav { 
      position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; font-weight: 900; }

    /* Hero */
    .hero { text-align: center; padding: 130px 20px 40px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { color: #25D366; font-size: 0.8rem; border: 1px solid #25D366; padding: 4px 15px; border-radius: 50px; display: inline-block; margin-top: 10px; }

    /* Grid */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .card-lux { background: var(--dark-grey); border: 1px solid #222; overflow: hidden; position: relative; transition: 0.4s; }
    .card-lux:hover { border-color: var(--gold); transform: translateY(-5px); }
    .card-lux img { width: 100%; height: 240px; object-fit: cover; filter: brightness(0.8); }
    .card-info { padding: 20px; text-align: center; }
    .price { font-size: 1.5rem; color: var(--gold); margin: 10px 0; font-weight: 700; display: block; }
    
    .btn-gold { background: var(--gold-gradient); color: black; border: none; padding: 12px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }

    /* Cart Drawer */
    #cart-slide {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
      background: #0d0d0d; z-index: 2000; transition: 0.5s; border-left: 2px solid var(--gold);
      display: flex; flex-direction: column;
    }
    #cart-slide.active { right: 0; }
    .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; }
    .qty-ctrl { display: flex; gap: 10px; align-items: center; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 50px; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: #111; padding: 25px; border: 1px solid var(--gold); width: 90%; max-width: 400px; text-align: center; }
    
    #bill-area { background: white; color: black; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .bill-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; border-bottom: 2px solid black; margin-bottom: 10px; display: inline-block; }

    .btn-pay { width: 100%; padding: 15px; margin-top: 10px; border: none; font-weight: 900; cursor: pointer; border-radius: 5px; }
    .btn-cod { background: #333; color: white; }
    .btn-online { background: #25D366; color: white; }
  </style>
</head>
<body>

<div id="bg-canvas"></div>
<audio id="crackSound" src="https://www.myinstants.com/media/sounds/egg-crack.mp3"></audio>

<nav>
  <div class="logo">EGG MASTER</div>
  <button onclick="toggleCart(true)" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 18px; border-radius:50px; cursor:pointer;">
    CART (<span id="cart-count">0</span>)
  </button>
</nav>

<div class="hero">
  <h1>Elite Egg Hub</h1>
  <div class="status">● WE ARE OPEN (24/7)</div>
</div>

<div class="container"><div class="grid" id="menu-grid"></div></div>

<div id="cart-slide">
  <div style="padding:25px; background:var(--gold-gradient); color:black; font-weight:900; display:flex; justify-content:space-between;">
    <span>YOUR SELECTION</span>
    <button onclick="toggleCart(false)" style="background:none; border:none; font-size:1.5rem;">✕</button>
  </div>
  <div class="cart-body" id="cart-items"></div>
  <div style="padding:25px; border-top:1px solid #222;">
    <h2 style="display:flex; justify-content:space-between; margin-bottom:20px;">
      Total: <span id="total-price" style="color:var(--gold);">₹0</span>
    </h2>
    <button class="btn-gold" onclick="openCheckout()">CHECKOUT NOW</button>
  </div>
</div>

<div id="checkout-modal" class="modal">
  <div class="modal-content">
    <div id="bill-area">
      <div class="bill-logo">🍳 EGG MASTER</div>
      <div id="bill-list" style="text-align:left; font-family:monospace; font-size:0.85rem; margin:10px 0;"></div>
      <hr>
      <h3 id="bill-total" style="margin-top:10px;"></h3>
    </div>

    <div id="qr-area" style="display:none; margin-bottom:20px;">
      <h4 style="color:var(--gold); margin-bottom:10px;">SCAN TO PAY</h4>
      <img id="upi-qr" style="width:160px; border:4px solid white;">
      <p style="font-size:0.8rem; margin-top:5px;">ID: ashishchavda9586@oksbi</p>
    </div>

    <div id="payment-choice">
      <p>Select Payment Method:</p>
      <button class="btn-pay btn-cod" onclick="finishOrder('Cash on Delivery (COD)')">COD (Cash on Delivery)</button>
      <button class="btn-pay btn-online" onclick="showOnlineUI()">Online Payment (QR)</button>
    </div>

    <button class="btn-gold" id="confirm-online-btn" style="display:none; margin-top:15px;" onclick="finishOrder('Online Paid')">Confirm & Send WhatsApp</button>
    
    <button onclick="location.reload()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Cancel</button>
  </div>
</div>

<script>
  const PHONE = "+919586096174";
  const MY_UPI = "ashishchavda9586@oksbi";
  
  const menu = [
    { id: 1, name: "Boiled Egg Fry", price: 60, img: "https://i.ibb.co/xSdzbzzf/boild-egg-fry.jpg" },
    { id: 2, name: "Bombay Omlet", price: 60, img: "https://i.ibb.co/vv1xsk7G/bombe-omlet.jpg" },
    { id: 3, name: "Bread Omlet", price: 60, img: "https://i.ibb.co/JRS6Lcyc/bread-omlet.jpg" },
    { id: 4, name: "Egg Bhurji", price: 60, img: "https://i.ibb.co/4Rh3gjss/egg-bhurji.jpg" },
    { id: 5, name: "Egg Kheema", price: 60, img: "https://i.ibb.co/7NJbpHnw/egg-khima.jpg" },
    { id: 6, name: "Egg Lachko", price: 80, img: "https://i.ibb.co/LDhLfpZy/egg-Lachko.jpg" },
    { id: 7, name: "Egg Masala Tikka", price: 60, img: "https://i.ibb.co/8DgfRBnK/egg-mashala-tikka.jpg" },
    { id: 8, name: "Gujarati Egg Curry", price: 60, img: "https://i.ibb.co/sdhXXfNw/gujrati-egg-curry.jpg" },
    { id: 9, name: "Masala Egg", price: 50, img: "https://i.ibb.co/QvV7YG8W/masala-egg.jpg" },
    { id: 10, name: "Surti Gotalo", price: 80, img: "https://i.ibb.co/pv1FGXCr/surti-gotalo.jpg" }
  ];

  let cart = [];

  // ThreeJS BG
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('bg-canvas').appendChild(renderer.domElement);
  const shape = new THREE.Mesh(new THREE.TorusKnotGeometry(10, 3, 100, 16), new THREE.MeshPhongMaterial({ color: 0xD4AF37, wireframe: true }));
  scene.add(shape);
  scene.add(new THREE.AmbientLight(0xffffff, 1));
  camera.position.z = 30;
  function animate() { requestAnimationFrame(animate); shape.rotation.y += 0.005; renderer.render(scene, camera); }
  animate();

  // Menu
  function renderMenu() {
    document.getElementById('menu-grid').innerHTML = menu.map(i => `
      <div class="card-lux">
        <img src="${i.img}">
        <div class="card-info">
          <h3>${i.name}</h3>
          <span class="price">₹${i.price}</span>
          <button class="btn-gold" onclick="addToCart(${i.id})">Add to selection</button>
        </div>
      </div>`).join('');
  }

  function addToCart(id) {
    document.getElementById('crackSound').play();
    const item = menu.find(m => m.id === id);
    const ex = cart.find(c => c.id === id);
    if(ex) ex.qty++; else cart.push({...item, qty:1});
    updateUI();
  }

  function remove(id) {
    const idx = cart.findIndex(c => c.id === id);
    if(idx > -1) { if(cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1); }
    updateUI();
  }

  function updateUI() {
    let t = 0, c = 0;
    document.getElementById('cart-items').innerHTML = cart.map(i => {
      t += (i.price * i.qty); c += i.qty;
      return `<div class="cart-item">
        <div><b>${i.name}</b><br>₹${i.price * i.qty}</div>
        <div class="qty-ctrl">
          <button onclick="remove(${i.id})" style="background:none; border:none; color:white;">-</button>
          <span>${i.qty}</span>
          <button onclick="addToCart(${i.id})" style="background:none; border:none; color:white;">+</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('total-price').innerText = "₹" + t;
    document.getElementById('cart-count').innerText = c;
  }

  function toggleCart(s) { document.getElementById('cart-slide').classList.toggle('active', s); }

  function openCheckout() {
    if(cart.length === 0) return alert("Selection is empty!");
    const total = document.getElementById('total-price').innerText;
    document.getElementById('bill-list').innerHTML = cart.map(i => `${i.name} x${i.qty} = ₹${i.price*i.qty}`).join('<br>');
    document.getElementById('bill-total').innerText = "Grand Total: " + total;
    document.getElementById('upi-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${MY_UPI}&pn=EggMaster&am=${total.replace('₹','')}&cu=INR`;
    document.getElementById('checkout-modal').style.display = 'flex';
  }

  function showOnlineUI() {
    document.getElementById('qr-area').style.display = 'block';
    document.getElementById('confirm-online-btn').style.display = 'block';
    document.getElementById('payment-choice').style.display = 'none';
  }

  async function finishOrder(method) {
    // 1. Download Bill
    const canvas = await html2canvas(document.getElementById('bill-area'));
    const link = document.createElement('a');
    link.download = `Bill_${Date.now()}.jpg`;
    link.href = canvas.toDataURL();
    link.click();

    // 2. Send WhatsApp (Direct Fix)
    let items = cart.map(i => `• ${i.name} (x${i.qty})`).join('%0A');
    const total = document.getElementById('total-price').innerText;
    const msg = `*EGG MASTER ORDER*%0A━━━━━━━━━━━━━━%0A${items}%0A━━━━━━━━━━━━━━%0A*TOTAL:* ${total}%0A*PAYMENT:* ${method}%0A%0A_Please confirm my order._`;
    
    // Yaha trigger fix kiya gaya hai
    window.location.href = `https://wa.me/${PHONE}?text=${msg}`;
  }

  renderMenu();
</script>
</body>
</html>
